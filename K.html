<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamico - The Future of Immersive Reality</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { background: radial-gradient(circle at top right, #3d005e, #0a001a); min-height: 100vh; }
        .btn-hover:hover { transform: scale(1.05); transition: 0.3s ease; }
        .perspective { perspective: 1000px; }
    </style>
</head>
<body class="text-white font-sans overflow-x-hidden">

    <nav id="nav" class="flex justify-between items-center p-6 lg:px-20">
        <div class="text-2xl font-black tracking-tighter">Gamico</div>
        <div class="hidden md:flex bg-white/5 backdrop-blur-md rounded-full px-8 py-2 gap-6 border border-white/10">
            <a href="#" class="text-sm hover:text-purple-400 transition">Home</a>
            <a href="#" class="text-sm hover:text-purple-400 transition">Platform</a>
            <a href="#" class="text-sm hover:text-purple-400 transition">Solutions</a>
        </div>
        <button id="loginBtn" class="bg-white text-black px-6 py-2 rounded-full font-bold text-sm btn-hover">Get Access</button>
    </nav>

    <main class="container mx-auto px-6 py-12 flex flex-col-reverse lg:flex-row items-center gap-12">
        <div id="hero-text" class="lg:w-1/2 space-y-6">
            <h1 class="text-5xl lg:text-7xl font-extrabold leading-tight">Your Reality, <br><span class="text-purple-400">Reimagined.</span></h1>
            <p class="text-gray-300 text-lg max-w-md leading-relaxed">Stop playing games and start living them. Our enterprise-grade AR & VR solutions blur the line between digital potential and physical reality.</p>
            <div class="flex gap-4">
                <button class="bg-purple-600 hover:bg-purple-500 px-8 py-4 rounded-full font-bold btn-hover">Start Experience</button>
                <button class="border border-white/20 hover:bg-white/10 px-8 py-4 rounded-full transition">View Demo</button>
            </div>
        </div>
        
        <div class="lg:w-1/2 perspective" id="hero-img">
            <div class="w-full h-96 bg-purple-900/30 rounded-3xl flex items-center justify-center border border-purple-500/30 shadow-[0_0_50px_rgba(168,85,247,0.3)] transition-transform duration-300">
                <span class="text-white/20 font-medium tracking-widest">VR IMMERSIVE ENGINE</span>
            </div>
        </div>
    </main>

    <section id="stats" class="container mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-white/5 p-8 rounded-3xl border border-white/5">
            <div class="text-center p-4">
                <h3 class="text-4xl font-bold"><span class="counter" data-target="200">0</span>+</h3>
                <p class="text-purple-300 text-sm uppercase tracking-wider">Immersive Worlds</p>
            </div>
            <div class="text-center p-4 border-l border-r border-white/10">
                <h3 class="text-4xl font-bold"><span class="counter" data-target="150">0</span>+</h3>
                <p class="text-purple-300 text-sm uppercase tracking-wider">Successful Projects</p>
            </div>
            <div class="text-center p-4">
                <h3 class="text-4xl font-bold"><span class="counter" data-target="500">0</span>+</h3>
                <p class="text-purple-300 text-sm uppercase tracking-wider">Global Innovators</p>
            </div>
        </div>
    </section>

    <script>
        const tl = gsap.timeline({defaults: {ease: "power4.out"}});
        tl.from("#nav", {y: -50, opacity: 0, duration: 1})
          .from("#hero-text > *", {y: 50, opacity: 0, duration: 0.8, stagger: 0.2}, "-=0.5")
          .from("#hero-img", {scale: 0.8, opacity: 0, duration: 1}, "-=0.5")
          .from("#stats", {y: 50, opacity: 0, duration: 1}, "-=0.5");

        const imgContainer = document.querySelector('#hero-img div');
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            gsap.to(imgContainer, {rotationY: x, rotationX: -y, duration: 0.5});
        });

        document.getElementById('loginBtn').addEventListener('click', () => { alert('Join the Gamico revolution!'); });

        const counters = document.querySelectorAll('.counter');
        const animateCounter = (el) => {
            const target = +el.getAttribute('data-target');
            gsap.to(el, { innerText: target, duration: 4, snap: { innerText: 1 }, ease: "power1.out" });
        };
        window.addEventListener('load', () => { counters.forEach(counter => animateCounter(counter)); });
    </script>
</body>
</html>
